<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="CRUSH 聚会游戏大厅：真心话大冒险、点 Moto 和大小姐牌。">
  <meta name="theme-color" content="#000000">
  <title>CRUSH｜今晚玩什么</title>
  <link rel="icon" href="assets/home/favicon.svg">
  <link rel="preload" href="assets/home/crush-game-directory.png" as="image">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <main class="game-menu">
    <h1 class="sr-only">CRUSH 今晚玩什么</h1>

    <nav class="menu-canvas" aria-label="选择游戏">
      <img
        class="menu-poster"
        src="assets/home/crush-game-directory.png"
        width="941"
        height="1672"
        alt=""
        aria-hidden="true"
      >

      <a
        class="game-link game-link--truth"
        href="games/truth-or-dare/"
        aria-label="进入《真心话大冒险》游戏"
      >
        <span class="sr-only">进入《真心话大冒险》游戏</span>
      </a>

      <a
        class="game-link game-link--moto"
        href="games/tap-moto/"
        aria-label="进入《点 Moto：别惹小毛头》游戏"
      >
        <span class="sr-only">进入《点 Moto：别惹小毛头》游戏</span>
      </a>

      <a
        class="game-link game-link--sister"
        href="games/sister-card/"
        aria-label="进入《大小姐牌》游戏"
      >
        <span class="sr-only">进入《大小姐牌》游戏</span>
      </a>
    </nav>
  </main>
</body>
</html>
