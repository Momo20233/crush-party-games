name: Deploy unified game site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tap-moto/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install MOTO dependencies
        working-directory: apps/tap-moto
        run: npm ci

      - name: Export MOTO as a static site
        working-directory: apps/tap-moto
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/games/tap-moto
          SITE_URL: ${{ steps.pages.outputs.origin }}
        run: npm run build:static

      - name: Assemble the three games
        run: npm run assemble

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
